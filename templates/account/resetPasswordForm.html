{% extends 'base.html' %}

{% block content %}
{% load static %}
<section class="login-container">
    {% include 'alerts.html' %}
    <form class="login-form reset-form" action="{% url 'resetPasswordForm' %}" method="POST"  >
        {% csrf_token %}
        <div class="register-icon">
            <img src="{% static 'images/icons/cart-black.png' %}" alt="">
        </div>
        <h3>Reset Password</h3>
        <input type="password" name="password" id="password" placeholder="Enter Your password" required>
        <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm email " required>
        <a href="{% url 'login' %}">Got password ? Login</a>
        <button type="submit"><strong>Reset</strong></button>
    </form>

    <small>Dont have an account ? <a href="{% url 'register' %}">Sign Up</a></small>
</section>
{% endblock %}
